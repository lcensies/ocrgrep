name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-deb:
    runs-on: ubuntu-latest
    env:
      DEBEMAIL: "ci@localhost"
      DEBFULLNAME: "CI"
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential debhelper dh-python python3-all \
            tesseract-ocr libtesseract-dev libleptonica-dev \
            python3-pil python3-tqdm devscripts libdistro-info-perl

      - name: Build .deb
        run: |
          cp -r packaging/debian debian
          chmod +x debian/rules
          VERSION=${GITHUB_REF_NAME#v}
          dch --no-conf --create --package ocrgrep --newversion "$VERSION-1" \
            --distribution unstable "Release $VERSION"
          dpkg-buildpackage -us -uc -b

      - uses: actions/upload-artifact@v4
        with:
          name: deb
          path: ../*.deb

  build-rpm:
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          dnf install -y git rpm-build python3-devel python3-pip \
            tesseract-devel leptonica-devel python3-pillow python3-tqdm

      - name: Build .rpm
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/^Version:.*/Version: $VERSION/" packaging/ocrgrep.spec
          mkdir -p ~/rpmbuild/{SOURCES,SPECS}
          cp packaging/ocrgrep.spec ~/rpmbuild/SPECS/
          tar czf ~/rpmbuild/SOURCES/ocrgrep-$VERSION.tar.gz \
            --transform "s|^|ocrgrep-$VERSION/|" \
            --exclude='.git' --exclude='packaging' .
          rpmbuild -bb ~/rpmbuild/SPECS/ocrgrep.spec

      - uses: actions/upload-artifact@v4
        with:
          name: rpm
          path: ~/rpmbuild/RPMS/**/*.rpm

  build-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - run: uv build

      - uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: dist/

  release:
    needs: [build-deb, build-rpm, build-wheel]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
